<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Snooker 2vs2 Team Tracker</title>
  </head>
  <body>
    <div class="container">
      <main id="setupScreen" class="panel panel-setup">
        <header class="setup-header">
          <h2>Snooker 2vs2 Tracker</h2>
          <p class="setup-subtitle">Configure Teams to Begin Frame Session</p>
        </header>

        <div class="form-group">
          <label for="redCount">Starting Reds Pack</label>
          <div class="select-wrapper">
            <select id="redCount">
              <option value="15">15 Reds (Standard 147)</option>
              <option value="10">10 Reds</option>
              <option value="6">6 Reds</option>
            </select>
          </div>
        </div>

        <div
          class="team-setup-grid"
          style="
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
          "
        >
          <div class="team-block">
            <label style="color: #38bdf8">Team A (Strikers)</label>
            <input
              type="text"
              id="tA_p1"
              value="Team A - Player 1"
              class="input-text"
              style="margin-bottom: 10px"
              maxlength="20"
            />
            <input
              type="text"
              id="tA_p2"
              value="Team A - Player 2"
              class="input-text"
              maxlength="20"
            />
          </div>
          <div class="team-block">
            <label style="color: #f59e0b">Team B (Strikers)</label>
            <input
              type="text"
              id="tB_p1"
              value="Team B - Player 1"
              class="input-text"
              style="margin-bottom: 10px"
              maxlength="20"
            />
            <input
              type="text"
              id="tB_p2"
              value="Team B - Player 2"
              class="input-text"
              maxlength="20"
            />
          </div>
        </div>

        <button
          class="btn btn-action btn-success"
          style="width: 100%"
          onclick="app.startMatch()"
        >
          Start 2vs2 Match
        </button>

        <footer class="panel footer-panel">
          <h3>Made by AK</h3>
        </footer>
      </main>

      <div id="matchScreen" class="hidden">
        <section class="panel panel-flat">
          <div class="scoreboard-grid" id="playersScoreboardGrid"></div>
        </section>

        <div class="panel status-banner" id="lblSnookerCalculator">
          Frame Status Checking...
        </div>

        <section class="ticker-row">
          <div class="panel ticker-item text-center">
            <div class="ticker-label">Current Break</div>
            <div class="ticker-val val-break" id="lblBreak">0</div>
          </div>
          <div class="panel ticker-item text-center">
            <div class="ticker-label">Points Remaining</div>
            <div class="ticker-val val-remaining" id="lblRemaining">147</div>
          </div>
        </section>

        <section class="panel table-visualizer">
          <div class="visualizer-header">
            <span class="visualizer-title">Live Table Inventory</span>
          </div>
          <div class="asset-pool" id="tableAssetPool"></div>
        </section>

        <section class="panel target-control-panel text-center">
          <div class="ticker-label target-header" id="lblTargetPhase">
            Target Phase: RED
          </div>
          <div class="ball-flex">
            <button class="ball-btn ball-1" onclick="app.potBall(1)" id="b1">
              1
            </button>
            <button class="ball-btn ball-2" onclick="app.potBall(2)" id="b2">
              2
            </button>
            <button class="ball-btn ball-3" onclick="app.potBall(3)" id="b3">
              3
            </button>
            <button class="ball-btn ball-4" onclick="app.potBall(4)" id="b4">
              4
            </button>
            <button class="ball-btn ball-5" onclick="app.potBall(5)" id="b5">
              5
            </button>
            <button class="ball-btn ball-6" onclick="app.potBall(6)" id="b6">
              6
            </button>
            <button class="ball-btn ball-7" onclick="app.potBall(7)" id="b7">
              7
            </button>
          </div>
        </section>

        <section class="panel controls-panel">
          <div class="btn-grid">
            <button class="btn btn-success" onclick="app.endTurn()">
              End Break Turn
            </button>
            <button class="btn btn-danger" onclick="app.undo()">
              ↶ Undo Move
            </button>
          </div>

          <div class="foul-control-wrapper">
            <div class="ticker-label foul-heading">
              Foul Assignment Control Panel
            </div>

            <div class="form-group" style="margin-bottom: 12px">
              <label
                for="foulAttributionSelect"
                style="font-size: 0.7rem; color: #cbd5e1"
                >Who committed the infraction?</label
              >
              <div class="select-wrapper">
                <select id="foulAttributionSelect"></select>
              </div>
            </div>

            <div class="foul-strategy-row">
              <button
                class="strategy-btn selected"
                id="btnFoulPass"
                onclick="app.setFoulStrategy('pass')"
              >
                PASS TURN
              </button>
              <button
                class="strategy-btn"
                id="btnFoulStay"
                onclick="app.setFoulStrategy('stay')"
              >
                FORCE RE-PLAY
              </button>
            </div>
            <div class="foul-grid">
              <button class="btn btn-foul" onclick="app.foul(4)">-4 Pts</button>
              <button class="btn btn-foul" onclick="app.foul(5)">-5 Pts</button>
              <button class="btn btn-foul" onclick="app.foul(6)">-6 Pts</button>
              <button class="btn btn-foul" onclick="app.foul(7)">-7 Pts</button>
            </div>
          </div>
        </section>

        <section
          class="panel text-center"
          id="exportControlPanel"
          style="border-color: rgba(56, 189, 248, 0.2)"
        >
          <div
            class="ticker-label"
            style="color: var(--system-blue); margin-bottom: 10px"
          >
            End-Game Analysis
          </div>
          <button
            class="btn btn-success"
            style="
              width: 100%;
              background: rgba(56, 189, 248, 0.15);
              border-color: var(--system-blue);
              color: #fff;
            "
            onclick="app.downloadMatchReport()"
          >
            📥 Download Frame Performance Report (.TXT)
          </button>
        </section>

        <section class="panel log-stream-panel">
          <div class="ticker-label log-title">Live Frame Log Stream</div>
          <div class="history-box" id="historyFeed"></div>

          <button class="btn btn-exit-session" onclick="app.exitToSetup()">
            Reset & Exit Match
          </button>
        </section>

        <footer class="panel footer-panel">
          <h3>Made by AK</h3>
        </footer>
      </div>
    </div>

    <div class="toast" id="toast">Rule Infraction Tracked!</div>
    <script src="main.js"></script>
  </body>
</html>
